%YAML 1.1
---

vars:
  address-groups:
    HOME_NET: "any"
    EXTERNAL_NET: "any"

default-rule-path: /var/lib/suricata/rules

rule-files:
  - suricata.rules

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - alert

af-packet:
  - interface: eth0
    threads: 1
