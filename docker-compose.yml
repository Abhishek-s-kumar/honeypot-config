# Suricata IDS service
  suricata:
    container_name: suricata
    restart: always
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    image: jasonish/suricata:latest
    volumes:
      - ${TPOT_DATA_PATH}/suricata/config/suricata.yaml:/etc/suricata/suricata.yaml
      - ${TPOT_DATA_PATH}/suricata/rules:/var/lib/suricata/rules
      - ${TPOT_DATA_PATH}/suricata/log:/var/log/suricata
    command: -c /etc/suricata/suricata.yaml -i eth0 --init-errors-fatal
